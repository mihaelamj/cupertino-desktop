name: CI

# The mechanical gates, run on GitHub as the backstop to the local git hooks.
# cupertino-desktop is an Apple-only app (macOS + iOS UI packages), so there is no
# Linux Swift job here; the cross-platform SwiftMCPClient it depends on is
# Linux-tested in its own CI. The package is swift-tools 6.2, so the macOS job
# selects the latest stable Xcode (the runner default can lag a release).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  style:
    name: Style and namespacing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Style gate (no em dashes, no tool attribution)
        run: bash scripts/check-style.sh
      - name: Namespacing gate (one type per file)
        run: bash scripts/check-namespacing.sh

  swift-macos:
    name: Swift (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Format, lint, build, test
        run: |
          brew install swiftformat swiftlint
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict
          cd Packages && swift build && swift test
