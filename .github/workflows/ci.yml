name: CI

# The mechanical gates, run on GitHub as the backstop to the local git hooks.
# Style runs now (docs). The Swift gates are guarded on Packages/Package.swift,
# so they stay green and skip until the engine package lands, then activate.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  style:
    name: Style and namespacing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Style gate (no em dashes, no tool attribution)
        run: bash scripts/check-style.sh
      - name: Namespacing gate (one type per file)
        run: bash scripts/check-namespacing.sh

  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format, lint, build, test
        run: |
          if [ ! -f Packages/Package.swift ]; then
            echo "No Packages/Package.swift yet; skipping Swift gates."
            exit 0
          fi
          brew install swiftformat swiftlint
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict
          cd Packages && swift build && swift test

  swift-linux:
    name: Swift (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          if [ ! -f Packages/Package.swift ]; then
            echo "No Packages/Package.swift yet; skipping Swift gates."
            exit 0
          fi
          cd Packages && swift build && swift test
