# Mechanical enforcement of the code rules a machine can decide
# (engineering.md principle: no force-unwrap in shipping code).
#
# Inert until Swift sources exist. The CI workflow that runs swiftlint plus
# build plus test ships with the engine package.
opt_in_rules:
  - force_unwrapping
disabled_rules:
  # The namespace-anchor convention (docs/rules/namespacing.md) deliberately nests
  # types under caseless-enum anchors (e.g. Transport.Subprocess.Failure,
  # Backend.MCP, UI.RootExperience), which the default nesting rule rejects.
  - nesting
excluded:
  - .build
  - Packages/.build
  # Vendored dependency reached via symlink; not our code to lint.
  - Packages/CupertinoUpstream
  # Xcode build output (dependency checkouts live under here); git-ignored, but
  # swiftlint scans the filesystem, not .gitignore.
  - "**/DerivedData"
  # Legacy, test, script, and tooling directories with existing violations
  - Packages/Sources/Lexer
  - Packages/Sources/Parser
  - Packages/Sources/TemplateExpander
  - Packages/Sources/Validation
  - Packages/Sources/PresentationBridge
  - Packages/Sources/xctemplate
  - Packages/Sources/PackManager
  - Packages/Sources/Decompiler
  - Packages/Sources/ShellAppKit
  - Packages/Sources/ShellSwiftUI
  - Packages/Sources/ShellUIKit
  - Packages/Sources/LocalSubprocessBackend
  - Packages/Sources/LocalEmbeddedBackend
  - Packages/Sources/UITestPageObjects
  - Packages/Sources/clil
  - Packages/Sources/Documentation
  - Packages/Sources/SharedModels
  - Packages/Sources/Localization
  - Packages/Tests
  - scripts
  - Packages/Package.swift
force_unwrapping: error
force_try: error
force_cast: error
# House width is 180 (CLAUDE.md / docs/rules/code-style.md and .swiftformat
# --maxwidth 180); swiftlint defaults to 120, so align it to avoid a split brain.
line_length:
  warning: 180
  error: 180
trailing_comma:
  mandatory_comma: true
type_name:
  excluded:
    - UI
