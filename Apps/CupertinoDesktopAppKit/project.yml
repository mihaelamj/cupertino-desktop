name: CupertinoDesktopAppKit
options:
  bundleIdPrefix: com.mihaelamj.cupertinodesktop
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  CupertinoDesktopPackages:
    path: ../../Packages
targets:
  CupertinoDesktopAppKit:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
    dependencies:
      - package: CupertinoDesktopPackages
        product: ShellAppKit
      - package: CupertinoDesktopPackages
        product: AppCore
      - package: CupertinoDesktopPackages
        product: FrameworkBrowserFeature
      - package: CupertinoDesktopPackages
        product: SearchFeature
      - package: CupertinoDesktopPackages
        product: MacBackendImpl
      - package: CupertinoDesktopPackages
        product: MobileBackendImpl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.appkit
        PRODUCT_NAME: CupertinoDesktopAppKit
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
  CupertinoDesktopAppKitUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: UITests
    dependencies:
      - target: CupertinoDesktopAppKit
      - package: CupertinoDesktopPackages
        product: UITestPageObjects
      - package: CupertinoDesktopPackages
        product: FlowSpec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.appkit.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CupertinoDesktopAppKit
schemes:
  CupertinoDesktopAppKit:
    build:
      targets:
        CupertinoDesktopAppKit: all
        CupertinoDesktopAppKitUITests: [test]
    test:
      targets:
        - CupertinoDesktopAppKitUITests
