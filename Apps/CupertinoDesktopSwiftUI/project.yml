name: CupertinoDesktopSwiftUI
options:
  bundleIdPrefix: com.mihaelamj.cupertinodesktop
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  CupertinoDesktopPackages:
    path: ../../Packages
targets:
  CupertinoDesktopSwiftUI:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
    dependencies:
      - package: CupertinoDesktopPackages
        product: ShellSwiftUI
      - package: CupertinoDesktopPackages
        product: AppCore
      - package: CupertinoDesktopPackages
        product: FrameworkBrowserFeature
      - package: CupertinoDesktopPackages
        product: MacBackendImpl
      - package: CupertinoDesktopPackages
        product: MobileBackendImpl
      - package: CupertinoDesktopPackages
        product: UpcomingSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.swiftui
        PRODUCT_NAME: CupertinoDesktopSwiftUI
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
  CupertinoDesktopSwiftUIUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: UITests
    dependencies:
      - target: CupertinoDesktopSwiftUI
      - package: CupertinoDesktopPackages
        product: UITestPageObjects
      - package: CupertinoDesktopPackages
        product: FlowSpec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.swiftui.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CupertinoDesktopSwiftUI
schemes:
  CupertinoDesktopSwiftUI:
    build:
      targets:
        CupertinoDesktopSwiftUI: all
        CupertinoDesktopSwiftUIUITests: [test]
    test:
      targets:
        - CupertinoDesktopSwiftUIUITests
