name: CupertinoMobileSwiftUI
options:
  bundleIdPrefix: com.mihaelamj.cupertinodesktop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  CupertinoDesktopPackages:
    path: ../../Packages
targets:
  CupertinoMobileSwiftUI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: CupertinoDesktopPackages
        product: ShellSwiftUI
      - package: CupertinoDesktopPackages
        product: AppCore
      - package: CupertinoDesktopPackages
        product: FrameworkBrowserFeature
      - package: CupertinoDesktopPackages
        product: SearchFeature
      - package: CupertinoDesktopPackages
        product: MobileBackendImpl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.mobile.swiftui
        PRODUCT_NAME: CupertinoMobileSwiftUI
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        TARGETED_DEVICE_FAMILY: "1,2"
  CupertinoMobileSwiftUIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: CupertinoMobileSwiftUI
      - package: CupertinoDesktopPackages
        product: UITestPageObjects
      - package: CupertinoDesktopPackages
        product: FlowSpec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.mobile.swiftui.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CupertinoMobileSwiftUI
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  CupertinoMobileSwiftUI:
    build:
      targets:
        CupertinoMobileSwiftUI: all
        CupertinoMobileSwiftUIUITests: [test]
    test:
      targets:
        - CupertinoMobileSwiftUIUITests
    run:
      config: Debug
