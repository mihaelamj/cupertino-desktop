name: CupertinoMobile
options:
  bundleIdPrefix: com.mihaelamj.cupertinodesktop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  CupertinoDesktopPackages:
    path: ../../Packages
targets:
  CupertinoMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: CupertinoDesktopPackages
        product: ShellSwiftUI
      - package: CupertinoDesktopPackages
        product: AppCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihaelamj.cupertinodesktop.mobile
        PRODUCT_NAME: CupertinoMobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        TARGETED_DEVICE_FAMILY: "1,2"
